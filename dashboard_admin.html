<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель СТК</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f0f0f0; padding: 20px; }
        
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; background: #eee; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #111; color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Стили для таблицы заказов */
        .orders-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .orders-table th { background: #111; color: white; padding: 12px; text-align: left; }
        .orders-table td { padding: 12px; border-bottom: 1px solid #eee; }
        .orders-table tr:hover { background: #f9f9f9; }
        .order-method { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; color: white; }
        .method-tg { background: #0088cc; }
        .method-wa { background: #25D366; }
        .method-vk { background: #0077FF; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        .btn-save { background: #111; color: white; padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-save:hover { background: #333; }
        
        .back-link { display: block; text-align: center; margin-top: 30px; color: #666; text-decoration: none; }
        .empty-msg { text-align: center; color: #999; padding: 40px 0; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ СТК Админ-панель</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('orders')">📦 Заказы</button>
            <button class="tab-btn" onclick="switchTab('editor')">✏️ Редактор цен</button>
        </div>

        <!-- Вкладка: Заказы -->
        <div id="orders" class="tab-content active">
            <h2>Поступившие заказы</h2>
            <div id="ordersList">
                <div class="empty-msg">Пока нет оформленных заказов. Ожидайте...</div>
            </div>
        </div>

        <!-- Вкладка: Редактор цен -->
        <div id="editor" class="tab-content">
            <h2>Настройки отображения</h2>
            <div class="input-group">
                <label>Цена за 1 км (в рублях):</label>
                <input type="number" id="pricePerKm" value="50">
            </div>
            <button class="btn-save" onclick="saveSettings()">💾 Сохранить настройки</button>
        </div>

        <a href="index.html" class="back-link">← На сайт СТК</a>
    </div>

    <script>
        // --- Переключение вкладок ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
            
            if (tabId === 'orders') renderOrders();
        }

        // --- Отображение заказов в таблице ---
        function renderOrders() {
            const container = document.getElementById('ordersList');
            const orders = JSON.parse(localStorage.getItem('stk_orders') || '[]');

            if (orders.length === 0) {
                container.innerHTML = `<div class="empty-msg">Пока нет оформленных заказов. Ожидайте...</div>`;
                return;
            }

            let html = `<table class="orders-table">
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Клиент</th>
                        <th>Телефон</th>
                        <th>Маршрут</th>
                        <th>Расстояние</th>
                        <th>Сумма</th>
                        <th>Связь</th>
                    </tr>
                </thead>
                <tbody>`;

            // Выводим заказы в обратном порядке (сначала новые)
            orders.slice().reverse().forEach(order => {
                let methodClass = 'method-tg';
                if (order.method === 'WhatsApp') methodClass = 'method-wa';
                if (order.method === 'VKontakte') methodClass = 'method-vk';

                html += `
                    <tr>
                        <td>${order.date || '—'}</td>
                        <td><strong>${order.name}</strong></td>
                        <td>${order.phone}</td>
                        <td>${order.from} → ${order.to}</td>
                        <td>${order.distance} км</td>
                        <td><strong>${order.price.toLocaleString('ru-RU')} ₽</strong></td>
                        <td><span class="order-method ${methodClass}">${order.method}</span></td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        // --- Сохранение настроек ---
        function saveSettings() {
            const price = document.getElementById('pricePerKm').value;
            localStorage.setItem('stk_admin_price', price);
            alert('✅ Цена за километр сохранена!');
        }

        // Загружаем сохраненную цену при открытии
        window.onload = function() {
            const savedPrice = localStorage.getItem('stk_admin_price');
            if (savedPrice) document.getElementById('pricePerKm').value = savedPrice;
            renderOrders();
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель СТК</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: #222; padding: 40px; border-radius: 12px; color: white; width: 300px; text-align: center; }
        .login-box h2 { margin-bottom: 20px; color: #ffc800; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 6px; border: none; }
        button { width: 100%; padding: 10px; background: #ffc800; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Вход в админку</h2>
        <input type="password" id="adminPass" placeholder="Введите пароль">
        <button onclick="checkPass()">Войти</button>
    </div>

    <script>
        function checkPass() {
            const pass = document.getElementById('adminPass').value;
            if (pass === '1234') { // Пароль админа
                window.location.href = 'dashboard_admin.html';
            } else {
                alert('Неверный пароль!');
            }
        }
    </script>
</body>
</html>
